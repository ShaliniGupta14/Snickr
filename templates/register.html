<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>snickr — Register</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div class="auth-page">
  <div class="auth-box">
    <div class="auth-logo">
      <div class="wordmark">snickr</div>
      <div class="tagline">Create your account</div>
    </div>
    {% if error %}
      <div class="alert alert-error">{{ error }}</div>
    {% endif %}
    <form method="post" action="/register" style="display:flex;flex-direction:column;gap:0;">
      <div class="form-group">
        <label>Email</label>
        <input type="email" name="email" placeholder="you@example.com" required autofocus>
      </div>
      <div class="form-group">
        <label>Username</label>
        <input type="text" name="username" placeholder="yourhandle" required>
      </div>
      <div class="form-group">
        <label>Nickname <span style="color:var(--text3);font-weight:400;text-transform:none;">(optional)</span></label>
        <input type="text" name="nickname" placeholder="Display name">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn-primary" style="width:100%;padding:0.75rem;font-size:0.95rem;margin-top:0.5rem;justify-content:center;">
        Create Account →
      </button>
    </form>
    <div class="auth-switch">
      Already have an account? <a href="/login">Sign in</a>
    </div>
  </div>
</div>
</body>
</html>
